spring.application.name=medz-loader
spring.datasource.url=jdbc:postgresql://localhost:5432/medz
spring.datasource.username=postgres
spring.datasource.password=password
spring.batch.jdbc.initialize-schema=always

# Directory containing the input CSV files.
# Override via the environment variable: MEDZ_LOADER_INPUT_DIR
medz.loader.input-dir=./input

# Time zone used to convert dates to UTC for storage.
# Override via the environment variable: MEDZ_LOADER_REGISTRATION_ZONE_ID
medz.loader.registration-zone-id=Africa/Algiers

