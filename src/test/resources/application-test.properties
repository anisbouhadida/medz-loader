# --- DataSource (matches the PostgreSQL service defined in ci.yml) -----------
spring.datasource.url=jdbc:postgresql://localhost:5432/medz_test
spring.datasource.username=medz
spring.datasource.password=medz
spring.datasource.driver-class-name=org.postgresql.Driver

# --- Spring Batch ------------------------------------------------------------
spring.batch.jdbc.initialize-schema=always
# Do not run the batch job automatically on context start during tests
spring.batch.job.enabled=false
