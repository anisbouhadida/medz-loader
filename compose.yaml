services:
  postgres:
    image: postgres:17-alpine
    container_name: medz-loader-postgres
    environment:
      POSTGRES_DB: medz
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
    ports:
      - "5432:5432"
    volumes:
      - medz-postgres-data:/var/lib/postgresql/data
      - ./docker/postgres/init:/docker-entrypoint-initdb.d:ro
      - ./src/main/resources/sql/ddl.sql:/medz-loader/sql/ddl.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d medz"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - medz-network

volumes:
  medz-postgres-data:

networks:
  medz-network:
    name: medz-network
